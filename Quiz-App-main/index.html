<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Fun Quiz App</h1>

    <!-- Quiz question -->
    <div id="quiz">
      <p id="question">Question will appear here</p>
      <div id="answers">
        <!-- Answer buttons generated by JS -->
      </div>
    </div>

    <!-- Score display -->
    <div id="scoreContainer" class="hidden">
      <h2 id="score"></h2>
      <button id="restartBtn">Restart Quiz</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
